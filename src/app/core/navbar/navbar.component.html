<aside class="sidebar h-full">
  <div
    class="sidebar bg-bg-sidebar rounded-[16px] py-5 h-full text-text-primary flex flex-col gap-6 items-center"
  >
    <app-tw-logo></app-tw-logo>
    <nav>
      <ul class="flex flex-col gap-3 justify-center h-full">
        @for (link of links; track link.name) {
          <li class="rounded-btn">
            <a
              [attr.aria-label]="link.name"
              class="w-10 h-10 flex items-center justify-center rounded-btn"
              [routerLink]="link.url"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              <lucide-icon [img]="link.icon" [size]="20" [strokeWidth]="1.5" />
            </a>
          </li>
        }
      </ul>
    </nav>
    <div class="mt-auto">
      <ul class="flex flex-col gap-4 justify-center ">
        <hr class="nav-divider" />
        <li class="rounded-btn">
          <a
            aria-label="Settings"
            class="w-10 h-10 flex items-center justify-center rounded-btn"
            [routerLink]=""
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <lucide-icon [img]="Settings" [size]="20" [strokeWidth]="1.5" />
          </a>
        </li>
        <li class="rounded-btn">
          <a
            aria-label="Logout"
            class="w-10 h-10 flex items-center justify-center rounded-btn"
            [routerLink]=""
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <lucide-icon [img]="LogOut" [size]="20" [strokeWidth]="1.5" />
          </a>
        </li>
      </ul>
    </div>
  </div>
</aside>
