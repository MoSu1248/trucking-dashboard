<div class="login-page">
  <div class="glass-card login-card">
    <div class="login-header">
      <img src="images/logo/twell-logo-white.svg" alt="Logo" class="login-logo w-30" />
      <h1>Welcome back</h1>
      <p>Sign in to your account</p>
    </div>

    <div class="login-form">
      <div class="form-field">
        <label for="email">EMAIL</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-input"
          placeholder="you@example.com"
        />
      </div>

      <div class="form-field">
        <label for="password">PASSWORD</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="••••••••"
        />
      </div>

      <a href="#" class="forgot-password w-fit ml-auto">Forgot password?</a>

      <button type="submit" class="btn-login">Sign In</button>
    </div>
  </div>
</div>
