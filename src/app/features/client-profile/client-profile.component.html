<section class="page-shell client-profile">

          <img src="images/client-icon.png" alt="client icon" class="w-full rounded-2xl" />
        </div>
        <div class="mt-6 flex flex-col gap-4 text-text-primary justify-between">

            <lucide-icon [img]="IdCard" [size]="20" />9902285103089

          <p class="client-profile__info"><lucide-icon [img]="User" [size]="20" /> Male</p>
