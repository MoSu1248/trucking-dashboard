<section class="p-4 h-full">
  <div class="glass-card h-full flex flex-col justify-between text-text-primary px-12! py-8!">
    <div class="form-section">
      <h2 class="form-heading">Personal Details</h2>
      <div class="form-grid">
        <div class="form-field">
          <label for="fname">First Name</label>
          <input type="text" id="fname" name="fname" class="form-input" />
        </div>
        <div class="form-field">
          <label for="lname">Last Name</label>
          <input type="text" id="lname" name="lname" class="form-input" />
        </div>
        <div class="form-field">
          <label for="id">ID</label>
          <input type="number" id="id" name="id" class="form-input" />
        </div>
        <div class="form-field">
          <label for="location">Location</label>
          <select name="location" id="location" class="form-input"></select>
        </div>
        <div class="form-field">
          <label for="role">Role</label>
          <select name="role" id="role" class="form-input"></select>
        </div>
        <div class="form-field">
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" name="phone" class="form-input" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2 class="form-heading">Login Details</h2>
      <div class="form-grid">
        <div class="form-field col-span-2">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="form-input" />
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-input" />
        </div>
        <div class="form-field">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" />
        </div>
      </div>
    </div>

    <button type="submit" class="submit-btn">Register</button>
  </div>
</section>
